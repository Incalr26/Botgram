- name: Create Release and upload APK
  id: create_release
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  run: |
    TAG="Botgram-v${VERSION}-${SHORT_SHA}"
    RELEASE_NAME="Botgram-v${VERSION}-${SHORT_SHA}"
    # 打印请求参数（方便核对）
    echo "Creating release with tag: $TAG, name: $RELEASE_NAME"
    
    # 发送创建请求并保存响应
    release_response=$(curl -X POST \
      -H "Authorization: token $GITHUB_TOKEN" \
      -H "Accept: application/vnd.github.v3+json" \
      https://api.github.com/repos/${{ github.repository }}/releases \
      -d "{\"tag_name\":\"$TAG\", \"name\":\"$RELEASE_NAME\", \"draft\":false, \"prerelease\":true}")
    
    # 打印完整响应（用于调试）
    echo "Release API response: $release_response"
    
    # 提取 upload_url
    upload_url=$(echo "$release_response" | jq -r .upload_url | sed 's/{?name,label}//')
    echo "Extracted upload_url: $upload_url"
    
    # 如果 upload_url 为空，打印错误并退出
    if [ -z "$upload_url" ] || [ "$upload_url" = "null" ]; then
      echo "Error: Failed to extract upload_url. Check API response above."
      exit 1
    fi
    
    # 上传 APK
    APK_PATH="app/build/outputs/apk/release/${APK_NAME}"
    curl -X POST \
      -H "Authorization: token $GITHUB_TOKEN" \
      -H "Content-Type: application/zip" \
      --data-binary @"$APK_PATH" \
      "${upload_url}?name=${APK_NAME}"
    
    RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$TAG"
    echo "RELEASE_URL=$RELEASE_URL" >> $GITHUB_ENV