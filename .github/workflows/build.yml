name: Build and Release APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build signed release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -Dandroid.aapt2FromMavenOverride=

      - name: Get version name
        id: get_version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | awk -F '"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Get commit details
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          {
            echo "SHORT_SHA=$SHORT_SHA"
            echo "COMMIT_MSG<<EOF"
            git log -1 --pretty=%B
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Get actor
        run: echo "ACTOR=${{ github.actor }}" >> $GITHUB_ENV

      - name: Rename APK
        run: |
          APK_ORIGINAL=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          NEW_NAME="Botgram-v${VERSION}-${SHORT_SHA}-release.apk"
          mv "$APK_ORIGINAL" "app/build/outputs/apk/release/$NEW_NAME"
          echo "APK_NAME=$NEW_NAME" >> $GITHUB_ENV

      - name: Create Release and upload APK
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="Botgram-v${VERSION}-${SHORT_SHA}"
          RELEASE_NAME="Botgram-v${VERSION}-${SHORT_SHA}"
          # 使用 jq 构建包含 body 的 JSON，自动转义特殊字符（如换行、引号）
          BODY_JSON=$(jq -n \
            --arg tag "$TAG" \
            --arg name "$RELEASE_NAME" \
            --arg body "$COMMIT_MSG" \
            '{tag_name: $tag, name: $name, draft: false, prerelease: true, body: $body}')
          release_response=$(curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "$BODY_JSON")
          upload_url=$(echo "$release_response" | jq -r .upload_url | sed 's/{?name,label}//')
          APK_PATH="app/build/outputs/apk/release/${APK_NAME}"
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @"$APK_PATH" \
            "${upload_url}?name=${APK_NAME}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$TAG"
          echo "RELEASE_URL=$RELEASE_URL" >> $GITHUB_ENV

      - name: Send APK to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APK_PATH="app/build/outputs/apk/release/${APK_NAME}"
          # 使用 printf 构建 caption，\n 会被解释为换行符，避免 YAML 多行字符串问题
          printf -v CAPTION "版本: ${VERSION}\n提交: <a href=\"https://github.com/${{ github.repository }}/commit/${SHORT_SHA}\">${SHORT_SHA}</a>\n<blockquote>${COMMIT_MSG}</blockquote>\n触发者: ${ACTOR}\n下载: <a href=\"https://t.me/Botgram_Channel/66\">Botgram_Channel</a> | <a href=\"${RELEASE_URL}\">Github</a>"
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
            -F "chat_id=${CHAT_ID}" \
            -F "document=@${APK_PATH}" \
            -F "caption=${CAPTION}" \
            -F "parse_mode=HTML")
          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "Telegram API 返回错误: $RESPONSE"
            exit 1
          else
            echo "Telegram 发送成功"
          fi