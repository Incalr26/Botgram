plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.incalr26.botgram'
    compileSdk 34

    def buildTimeMillis = System.currentTimeMillis()
    def buildDate = new Date(buildTimeMillis).format('yyyy-MM-dd')

    // 暂不使用自定义签名，已注释
    // signingConfigs {
    //     release {
    //         storeFile file("${System.properties['user.home']}/botgram-release.jks")
    //         storePassword project.findProperty('RELEASE_STORE_PASSWORD')
    //         keyAlias "botgram"
    //         keyPassword project.findProperty('RELEASE_KEY_PASSWORD')
    //     }
    // }

    defaultConfig {
        applicationId "com.incalr26.botgram"
        minSdk 24
        targetSdk 34
        versionCode 4
        versionName "0.0.4-g3test"
        buildConfigField "String", "BUILD_DATE", "\"${buildDate}\""
        buildConfigField "long", "BUILD_TIME_MILLIS", "${buildTimeMillis}L"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug   // 使用调试签名
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        buildConfig true
        viewBinding true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.12.0'
    implementation 'io.coil-kt:coil:2.5.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.6.2'
    implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.6.2'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}